<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: transparent; }
        .flex { display: flex; gap: 25px; align-items: flex-start; max-width: 1100px; margin: 0 auto; }
        .side { width: 200px; flex-shrink: 0; }
        .grid { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { background: #fff; border: 1px solid #e3c8c4; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .nome { color: #a0665d; font-size: 18px; font-weight: bold; text-transform: uppercase; margin: 10px 0; }
        
        .cat-tag {
            color: #a0665d; font-size: 10px; font-weight: 900; text-transform: uppercase;
            border-bottom: 2px solid #a0665d; display: table; margin-left: auto;
            padding-bottom: 2px; margin-bottom: 10px; letter-spacing: 1px;
        }

        .btn {
            width: 32px; height: 32px; 
            display: inline-flex; align-items: center; justify-content: center;
            text-decoration: none !important; transition: 0.2s; margin-right: 8px;
            background: transparent;
        }
        .btn:hover { transform: scale(1.15); opacity: 0.8; }
        
        .btn img {
            width: 100%; height: 100%;
            object-fit: contain; display: block;
        }

        .input { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid #a0665d; outline: none; margin-bottom: 12px; box-sizing: border-box; }
        .menu { background: #fff; border: 1px solid #e3c8c4; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .voce { padding: 12px 15px; cursor: pointer; color: #a0665d; font-size: 13px; font-weight: bold; border-bottom: 1px solid #f2e2e0; }
        .voce.attiva { background: #a0665d; color: #fff; }
        
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } .flex { flex-direction: column; } .side { width: 100%; } }
    </style>
</head>
<body>

<div class="flex">
    <div class="side">
        <input type="text" id="cerca" onkeyup="render()" placeholder="Cerca nome..." class="input">
        <input type="text" id="cercaLuogo" onkeyup="render()" placeholder="Cerca città o regione..." class="input">
        <div class="menu">
            <div class="voce attiva" onclick="filter('TUTTI', this)">TUTTI</div>
            <div class="voce" onclick="filter('ASSOCIAZIONI', this)">ASSOCIAZIONI</div>
            <div class="voce" onclick="filter('CENTRI E STUDI', this)">CENTRI E STUDI</div>
            <div class="voce" onclick="filter('PSICHIATRI', this)">PSICHIATRI</div>
            <div class="voce" onclick="filter('PSICOLOGI', this)">PSICOLOGI</div>
            <div class="voce" onclick="filter('ALTRI PROFESSIONISTI', this)">ALTRI PROFESSIONISTI</div>
        </div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<script>
    const dati = [
    {n: "PAS Italia - Elenco operatori", c: "ASSOCIAZIONI", b: "Elenco operatori certificati dall'Associazione", l: "Nazionale", w: "https://www.personealtamentesensibili.it/operatori/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Escogito", c: "CENTRI E STUDI", b: "Studio professionale multidisciplinare", l: "Milano", w: "https://www.escogito.info/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "evolù", c: "CENTRI E STUDI", b: "Studio professionale multidisciplinare", l: "Milano", w: "https://evolucounseling.it/", m: "", wa: "", ig: "", fb: "", t: ""},        
    {n: "369 / Kairon Academy", c: "CENTRI E STUDI", b: "", l: "Online, Trebaseleghe (PD)", w: "https://www.369kaironacademy.com//", m: "", wa: "", ig: "", fb: "", t: ""},      
    {n: "Dott.ssa Julie Bjelland", c: "PSICOLOGI", b: "Psicologa, psicoterapeuta, Brain Training for Sensitive and Neurodivergent Nervous Systems", l: "Online", w: "https://www.juliebjelland.com/hsp-course-brain-training", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Dott.ssa Tiziana Casazza", c: "PSICOLOGI", b: "Psicologa, psicoterapeuta, insegnante di Pratica Bioenergetica", l: "Milano", w: "https://www.tizianacasazzapsicologa.it/index.html", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Dott.ssa Nicoletta Travaini", c: "PSICOLOGI", b: "Psicologa, psicoterapeuta, insegnante di Psicosomatica", l: "Milano", w: "https://ipersensibili.com/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Dott.ssa Elena Rago", c: "PSICOLOGI", b: "Psicologa, psicoterapeuta", l: "Online", w: "https://www.paspeople.com/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Francesca Santamaria Palombo", c: "PSICOLOGI", b: "Psicoterapeuta per Donne Altamente Sensibili", l: "Online", ig: "https://www.instagram.com/psicobenesserealfemminile/", fb: "", t: ""},
    {n: "Dott.ssa Eva-Lena Fehlmann", c: "ALTRI PROFESSIONISTI", b: "Consulente certificata in Mindfulness per l'Alta Sensibilità", l: "Svizzera", w: "https://www.studiopolarityhsp.ch/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Dott.ssa Anna Maria Le Moli", c: "ALTRI PROFESSIONISTI", b: "Counselor Relazionale Advanced, Sociologa, Life Coach", l: "Roma", w: "https://www.counseloraroma.it/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Dottoressa Sara Gisondi", c: "ALTRI PROFESSIONISTI", b: "Consulente certificata in Mindfulness per l'Alta Sensibilità", l: "Online", w: "https://www.mindfulnessperhsp.it/", m: "", wa: "", ig: "", fb: "", t: ""},
    {n: "Elisa Tramontin", c: "ALTRI PROFESSIONISTI", b: "Coach per Donne Altamente Sensibili", l: "Online", w: "https://elisatramontin.com/", m: "", wa: "", ig: "", fb: "", t: ""},

];

let catSel = 'TUTTI';
    function render() {
    const qNome = document.getElementById('cerca').value.toLowerCase();
    const qLuogo = document.getElementById('cercaLuogo').value.toLowerCase(); // Legge il luogo
    const g = document.getElementById('grid');
    let h = '';
    
    dati.forEach(p => {
        const matchNome = p.n.toLowerCase().includes(qNome);
        const matchCat = (catSel === 'TUTTI' || p.c === catSel);
        // Controlla se il luogo inserito è presente nel campo 'l' del professionista
        const matchLuogo = p.l ? p.l.toLowerCase().includes(qLuogo) : true;

        if (matchNome && matchCat && matchLuogo) {
            let s = '';
            if (p.w)  s += `<a href="${p.w}" target="_blank" class="btn"><img src="www.jpg"></a>`;
            // ... (resto dei tuoi pulsanti social) ...

            h += `<div class="card">
                    <div class="cat-tag">${p.c}</div>
                    <div class="nome">${p.n}</div>
                    <p style="font-size:14px; color:#a0665d; margin-bottom:5px;">📍 ${p.l || 'Riceve online'}</p>
                    <p style="font-size:14px;color:#555;flex-grow:1;margin:5px 0">${p.b}</p>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:15px;">${s}</div>
                  </div>`;
        }
    });
    g.innerHTML = h || '<p style="grid-column: span 2; text-align: center; padding: 20px;">Nessun risultato trovato.</p>';
}

    function filter(c, el) {
        catSel = c;
        document.querySelectorAll('.voce').forEach(v => v.classList.remove('attiva'));
        el.classList.add('attiva');
        render();
    }

    render();
</script>
</body>
</html>
